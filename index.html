<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witze App - Rechtliche Hinweise</title>
    <style>
        body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    line-height: 1.6; 
    background-color: #000000; /* Hintergrund schwarz */
    color: #ffffff; /* Schrift weiß */
    max-width: 800px; 
    margin: 0 auto; 
    padding: 20px;
    text-align: center; max-width 600px
}

h1, h2, h3 { 
    color: #FFD700; /* Überschriften gelb */
    border-bottom: 1px solid #333;
    padding-bottom: 10px;
    margin-top: 30px;
}

/* Normale Links im Text (z.B. E-Mail-Adressen) */
a {
    color: #87CEEB; /* Helles Blau für gute Lesbarkeit auf Schwarz */
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
    color: #FFD700;
}

/* Button Styling (speziell für index.html) */
.button { 
    display: inline-block; 
    padding: 12px 24px; 
    margin: 10px; 
    background-color: #0B132B; /* Button normal: schwarz-blau */
    color: #E0F7FA; /* Button-Text normal: weiss-blau */
    text-decoration: none; 
    border-radius: 8px; 
    font-weight: bold; 
    transition: all 0.3s ease;
    border: 1px solid #1C2A4D; /* Leichte Kante für etwas Tiefe */
}

.button:hover { 
    background-color: #FFD700; /* Button hover: gelb */
    color: #000000; /* Button-Text hover: schwarz */
    text-decoration: none; 
}

/* Besondere Hinweis-Boxen (für Nutzungsbedingungen) */
.note { 
    background: #0B132B; 
    border-left: 5px solid #FFD700; 
    padding: 15px; 
    margin: 20px 0; 
    font-style: italic; 
}

/* Listenabstände für bessere Lesbarkeit */
ul, li {
    margin-bottom: 8px;
}
    </style>
</head>
<body>
    <h1>Witze App</h1>
    <p>Hier findest du alle rechtlichen Dokumente zu unserer App.</p>
    
    <div style="margin-top: 30px;">
        <a href="datenschutz.html" class="button">Datenschutzerklärung</a><br>
        <a href="nutzungsbedingungen.html" class="button">Nutzungsbedigungen</a><br>
        <a href="impressum.html" class="button">Impressum</a>
    </div>
</body>
</html>
